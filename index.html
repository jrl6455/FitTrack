<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FitTrack Pro</title>


  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="main style.css">
</head>

<body>


<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <span class="navbar-brand mb-0 h1">FitTrack Pro</span>
  </div>
</nav>

<div class="container text-center mt-5">
  <h1>Track Your Fitness Journey</h1>
  <p>Plan workouts. Monitor progress. Stay consistent.</p>
  <button class="btn btn-primary">Get Started</button>
</div>
  <div class="container mt-5">
  <h3>Log Workout</h3>

  <input id="exercise" class="form-control mb-2" placeholder="Exercise">
  <input id="sets" class="form-control mb-2" placeholder="Sets">
  <input id="reps" class="form-control mb-2" placeholder="Reps">

  <button class="btn btn-success" onclick="addWorkout()">Add Workout</button>

  <ul id="workoutList" class="mt-3"></ul>
</div>
  <div class="mt-4">
  <h4>Total Workouts Logged:</h4>
  <p id="counter">0</p>
</div>

  <div class="container text-center">
  <h3 class="mt-5">Progress Chart</h3>
  <canvas id="myChart"></canvas>
</div>

<div class="container mt-4 text-center"></div>

<input id="weight" class="form-control mb-2" placeholder="Weight (lbs)">

<select id="type" class="form-control mb-2">
  <option value="Push">Push</option>
  <option value="Pull">Pull</option>
  <option value="Legs">Legs</option>
</select>

<input id="notes" class="form-control mb-2" placeholder="Notes (optional)">

<canvas id="myChart" width="400" height="200"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="main.js"></script>
</body>
</html>
