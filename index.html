<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FitTrack Pro</title>
  <h5 class="text-center">Welcome back 👋</h5>


  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="main style.css">
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <span class="navbar-brand mb-0 h1">FitTrack Pro</span>
  </div>
</nav>

<div class="container text-center mt-5">
  <h1>Track Your Fitness Journey</h1>
  <p>Plan workouts. Monitor progress. Stay consistent.</p>
</div>

<div class="container mt-4">
  <div class="card p-4 shadow-sm">
    <h3>Log Workout</h3>

    <input id="exercise" class="form-control mb-2" placeholder="Exercise">
    <input id="sets" class="form-control mb-2" placeholder="Sets">
    <input id="reps" class="form-control mb-2" placeholder="Reps">
    <input id="weight" class="form-control mb-2" placeholder="Weight (lbs)">

    <select id="type" class="form-control mb-2">
      <option value="Push">Push</option>
      <option value="Pull">Pull</option>
      <option value="Legs">Legs</option>
    </select>

    <input id="notes" class="form-control mb-2" placeholder="Notes (optional)">

    <button class="btn btn-success w-100" onclick="addWorkout()">
      Add Workout
    </button>
  </div>
</div>

<div class="container mt-4">
  <div class="card p-3 shadow-sm">

    <h4>Total Workouts Logged: <span id="counter">0</span></h4>

    <div class="mb-3">
      <button onclick="setFilter('All')" class="btn btn-sm btn-primary">All</button>
      <button onclick="setFilter('Push')" class="btn btn-sm btn-danger">Push</button>
      <button onclick="setFilter('Pull')" class="btn btn-sm btn-info">Pull</button>
      <button onclick="setFilter('Legs')" class="btn btn-sm btn-success">Legs</button>
    </div>

    <ul id="workoutList" class="list-group"></ul>

  </div>
</div>

<div class="container mt-4">
  <div class="card p-4 shadow-sm text-center">
    <h4>Progress Chart</h4>
    <canvas id="myChart"></canvas>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="main.js"></script>

</body>
</html>
